<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Books</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Action</th>
    </tr>

    <tr th:each="b : ${books}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.title}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${b.price}"></td>
        <td>
            <a th:href="@{/books/{id}(id=${b.id})}">View</a>
            <a th:href="@{/books/delete/{id}(id=${b.id})}">Delete</a>
        </td>
    </tr>

</table>

<a href="/dashboard">Dashboard</a>

</body>
</html>

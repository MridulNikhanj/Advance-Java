<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Add Book</h2>

<form th:action="@{/books/add}" th:object="${book}" method="post">

    Title: <input th:field="*{title}"/>
    <p th:errors="*{title}"></p>

    Author: <input th:field="*{author}"/>
    <p th:errors="*{author}"></p>

    Price: <input type="number" th:field="*{price}"/>
    <p th:errors="*{price}"></p>

    <button type="submit">Save</button>
</form>

<a href="/dashboard">Dashboard</a>

</body>
</html>
